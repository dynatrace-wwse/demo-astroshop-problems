apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deployment.kubernetes.io/revision: "1"
  labels:
    app.kubernetes.io/component: loadgenerator
    app.kubernetes.io/instance: astroshop
    app.kubernetes.io/name: astroshop-loadgenerator
    app.kubernetes.io/part-of: astroshop-load
    app.kubernetes.io/version: 1.12.0
    opentelemetry.io/name: astroshop-loadgenerator
  name: astroshop-loadgenerator
  namespace: astroshop-load
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      opentelemetry.io/name: astroshop-loadgenerator
  template:
    metadata:
      annotations:
        metadata.dynatrace.com/process.technology: python
        oneagent.dynatrace.com/inject: "false"
      labels:
        app.kubernetes.io/component: loadgenerator
        app.kubernetes.io/instance: astroshop
        app.kubernetes.io/name: astroshop-loadgenerator
        opentelemetry.io/name: astroshop-loadgenerator
    spec:
      containers:
        - env:
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.kubernetes.io/component']
            - name: OTEL_COLLECTOR_NAME
              value: astroshop-otel-gateway-collector
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: cumulative
            - name: LOCUST_WEB_PORT
              value: "8089"
            - name: LOCUST_USERS
              value: "10"
            - name: LOCUST_SPAWN_RATE
              value: "1"
            - name: LOCUST_HOST
              value: "https://PLACEHOLDER_DOMAIN"
            - name: LOCUST_HEADLESS
              value: "true"
            - name: LOCUST_AUTOSTART
              value: "true"
            - name: LOCUST_BROWSER_TRAFFIC_ENABLED
              value: "true"
            - name: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
              value: python
            - name: FLAGD_HOST
              value: astroshop-flagd
            - name: FLAGD_PORT
              value: "8013"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "dynatrace-otel-gateway-collector"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=loadgen,service.namespace=astroshop-load,service.version=1.12.0
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          name: loadgenerator
          ports:
            - containerPort: 8089
              name: service
              protocol: TCP
          resources:
            limits:
              memory: 2Gi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
