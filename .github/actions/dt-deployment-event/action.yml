name: Dynatrace deployment event
description: |
  Sends a CUSTOM_DEPLOYMENT event to Dynatrace Events v2 + a pipeline-run
  SDLC event that feeds the CI/CD Observability app. Enriches both events
  with PR / Change details (PR url, title, author, files-changed count,
  change-ticket) so Davis problem tickets show "which PR caused this".

inputs:
  dt_tenant_url:
    description: "Dynatrace tenant URL (https://abc12345.live.dynatrace.com)"
    required: true
  dt_api_token:
    description: "API token with events.ingest + openpipeline.events.ingest scopes"
    required: true
  application:
    description: "Logical app name (defaults to the repo name)"
    required: false
    default: ${{ github.event.repository.name }}
  release_version:
    description: "Version being released (e.g. 1.12.1)"
    required: true
  release_stage:
    description: "Deployment stage (staging | production)"
    required: false
    default: staging
  problem:
    description: "Deliberate issue flag for the demo (none | cpu | memory | nplusone | error)"
    required: false
    default: none
  change_ticket:
    description: "Optional change/ticket ID (Jira/ServiceNow/etc.) to surface on problem cards"
    required: false
    default: ""

runs:
  using: "composite"
  steps:

    - name: Resolve PR / change context
      id: pr
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        # Defaults — overwritten when we can resolve a PR
        pr_number=""
        pr_url=""
        pr_title=""
        pr_author=""
        pr_merged_at=""
        files_changed=0
        commit_msg=""

        case "${{ github.event_name }}" in
          pull_request|pull_request_target)
            pr_number="${{ github.event.pull_request.number }}"
            pr_url="${{ github.event.pull_request.html_url }}"
            pr_title="${{ github.event.pull_request.title }}"
            pr_author="${{ github.event.pull_request.user.login }}"
            pr_merged_at="${{ github.event.pull_request.merged_at }}"
            files_changed="${{ github.event.pull_request.changed_files }}"
            ;;
          push|workflow_dispatch|*)
            # Use gh to find the PR that contains this SHA (best-effort)
            pr_json=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              -H "Accept: application/vnd.github.groot-preview+json" 2>/dev/null \
              | jq '.[0] // empty' 2>/dev/null || echo "")
            if [ -n "$pr_json" ]; then
              pr_number=$(jq -r '.number // ""' <<<"$pr_json")
              pr_url=$(jq    -r '.html_url // ""' <<<"$pr_json")
              pr_title=$(jq  -r '.title // ""' <<<"$pr_json")
              pr_author=$(jq -r '.user.login // ""' <<<"$pr_json")
              pr_merged_at=$(jq -r '.merged_at // ""' <<<"$pr_json")
              files_changed=$(jq -r '.changed_files // 0' <<<"$pr_json")
            fi
            ;;
        esac

        # Short commit message for the title (first line, <120 chars)
        commit_msg=$(git log -1 --pretty=%s 2>/dev/null | head -c 120 || true)

        # Stash to outputs — escape quotes for the JSON heredoc later
        esc(){ printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'; }

        {
          echo "pr_number=${pr_number}"
          echo "pr_url=${pr_url}"
          echo "pr_title=$(esc "$pr_title")"
          echo "pr_author=${pr_author}"
          echo "pr_merged_at=${pr_merged_at}"
          echo "files_changed=${files_changed}"
          echo "commit_msg=$(esc "$commit_msg")"
        } >> "$GITHUB_OUTPUT"

        echo "Resolved PR context: #${pr_number:-none} (${pr_author:-?}) — ${pr_title:-no PR}"

    - name: Fire CUSTOM_DEPLOYMENT (Events v2)
      shell: bash
      env:
        DT: ${{ inputs.dt_tenant_url }}
        TOKEN: ${{ inputs.dt_api_token }}
        APP: ${{ inputs.application }}
        VER: ${{ inputs.release_version }}
        STAGE: ${{ inputs.release_stage }}
        PROBLEM: ${{ inputs.problem }}
        CHANGE: ${{ inputs.change_ticket }}
        CI_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        SHA: ${{ github.sha }}
        BRANCH: ${{ github.ref_name }}
        PR_NUM: ${{ steps.pr.outputs.pr_number }}
        PR_URL: ${{ steps.pr.outputs.pr_url }}
        PR_TITLE: ${{ steps.pr.outputs.pr_title }}
        PR_AUTHOR: ${{ steps.pr.outputs.pr_author }}
        PR_MERGED_AT: ${{ steps.pr.outputs.pr_merged_at }}
        FILES_CHANGED: ${{ steps.pr.outputs.files_changed }}
        COMMIT_MSG: ${{ steps.pr.outputs.commit_msg }}
      run: |
        set -euo pipefail

        # Build properties block. Empty values still get keys so the
        # Davis problem card has stable field names.
        payload=$(cat <<JSON
        {
          "eventType": "CUSTOM_DEPLOYMENT",
          "title": "${APP} release ${VER} (${PROBLEM})${PR_NUM:+ — PR #${PR_NUM}}",
          "entitySelector": "type(SERVICE),toRelationships.partOf(type(NAMESPACE),entityName.equals(${APP}))",
          "timeout": 5,
          "properties": {
            "deploymentName": "${APP} release ${VER}",
            "deploymentVersion": "${VER}",
            "deploymentProject": "${APP}",
            "ciBackLink": "${CI_URL}",
            "Release_Stage": "${STAGE}",
            "Application": "${APP}",
            "PROBLEM": "${PROBLEM}",
            "change.ticket": "${CHANGE}",
            "git.commit.id": "${SHA}",
            "git.commit.branch": "${BRANCH}",
            "git.commit.message": "${COMMIT_MSG}",
            "Repository": "${{ github.repository }}",
            "pr.number": "${PR_NUM}",
            "pr.url": "${PR_URL}",
            "pr.title": "${PR_TITLE}",
            "pr.author": "${PR_AUTHOR}",
            "pr.merged_at": "${PR_MERGED_AT}",
            "pr.files_changed": "${FILES_CHANGED}"
          }
        }
        JSON
        )
        # observability MUST NOT block delivery — non-fatal
        code=$(curl -sk -o /tmp/dt-event.out -w '%{http_code}' \
          -X POST "${DT%/}/api/v2/events/ingest" \
          -H "Authorization: Api-Token ${TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$payload" || echo "000")
        echo "Events v2 response: HTTP $code"
        cat /tmp/dt-event.out | head -c 500 || true

    - name: Fire pipeline-run SDLC event (feeds CI/CD Observability app)
      shell: bash
      env:
        DT: ${{ inputs.dt_tenant_url }}
        TOKEN: ${{ inputs.dt_api_token }}
        APP: ${{ inputs.application }}
        VER: ${{ inputs.release_version }}
        STAGE: ${{ inputs.release_stage }}
        PROBLEM: ${{ inputs.problem }}
        PR_NUM: ${{ steps.pr.outputs.pr_number }}
        PR_URL: ${{ steps.pr.outputs.pr_url }}
        PR_TITLE: ${{ steps.pr.outputs.pr_title }}
        PR_AUTHOR: ${{ steps.pr.outputs.pr_author }}
      run: |
        set -euo pipefail
        outcome=$([ "${{ job.status }}" = "success" ] && echo success || echo failed)
        now=$(date -u +"%Y-%m-%dT%H:%M:%S.000000000Z")
        start=$(date -u -d "60 seconds ago" +"%Y-%m-%dT%H:%M:%S.000000000Z")
        payload=$(cat <<JSON
        {
          "cicd.pipeline.id": "${APP}-release",
          "cicd.pipeline.run.id": ${{ github.run_id }},
          "cicd.pipeline.name": "${APP} release pipeline",
          "cicd.pipeline.run.outcome": "${outcome}",
          "cicd.pipeline.run.url.full": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
          "ext.pipeline.build.name": "${APP} ${VER} (${PROBLEM})${PR_NUM:+ — PR #${PR_NUM}: ${PR_TITLE}}",
          "ext.pipeline.run.trigger.user": "${{ github.actor }}",
          "vcs.ref.head.name": "${{ github.ref_name }}",
          "vcs.repository.name": "${{ github.repository }}",
          "vcs.pr.number": "${PR_NUM}",
          "vcs.pr.url": "${PR_URL}",
          "vcs.pr.author": "${PR_AUTHOR}",
          "event.category": "pipeline",
          "event.status": "finished",
          "event.type": "deploy",
          "event.provider": "github-actions",
          "duration": 60,
          "start_time": "${start}",
          "end_time": "${now}"
        }
        JSON
        )
        code=$(curl -sk -o /tmp/dt-sdlc.out -w '%{http_code}' \
          -X POST "${DT%/}/platform/ingest/custom/events.sdlc/github" \
          -H "Authorization: Api-Token ${TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$payload" || echo "000")
        echo "SDLC ingest response: HTTP $code"
        cat /tmp/dt-sdlc.out | head -c 500 || true
